    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow-x: hidden;
        }

        /* Animated Canvas Background */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        /* Responsive Container */
        .container {
            width: 90%;
            max-width: 400px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            margin-bottom: 1.2rem;
            object-fit: cover;
            transition: 0.4s ease;
        }

        .profile-img:hover { transform: scale(1.1) rotate(5deg); }

        h1 { font-size: 1.7rem; letter-spacing: 1px; margin-bottom: 8px; }

        /* Typing Effect */
        .typing-container {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            height: 20px;
        }

        .typing-text {
            border-right: 2px solid #fff;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            width: 0;
            animation: typing 3s steps(20, end) forwards, blink 0.8s infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }

        /* Functional Links */
        .links-list { display: flex; flex-direction: column; gap: 14px; }

        .link-item {
            padding: 1.1rem;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .link-item i { font-size: 1.4rem; width: 30px; margin-right: 15px; }
        .link-item span { flex-grow: 1; text-align: center; margin-right: 30px; }

        /* Brands Color Gradients */
        .whatsapp { background: linear-gradient(90deg, #25D366, #128C7E); }
        .telegram { background: linear-gradient(90deg, #0088cc, #005580); }
        .instagram { background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045); }
        .youtube { background: linear-gradient(90deg, #ff0000, #cc0000); }

        .link-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            filter: brightness(1.2);
        }

        .link-item:active { transform: scale(0.98); }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .container { padding: 2rem 1.2rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let time = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            time += 0.005;
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Responsive blobs
            for (let x = 0; x <= 20; x += 10) {
                for (let y = 0; y <= 20; y += 10) {
                    const r = Math.floor(127 + 127 * Math.sin(x * 0.1 + time));
                    const g = Math.floor(100 + 100 * Math.cos(y * 0.1 + time));
                    const b = Math.floor(150 + 100 * Math.sin(time));
                    
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.beginPath();
                    const posX = (x / 20) * canvas.width;
                    const posY = (y / 20) * canvas.height;
                    ctx.arc(posX, posY, canvas.width * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
