    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let time = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            time += 0.003; 
            ctx.fillStyle = '#050000'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let x = 0; x <= 20; x += 10) {
                for (let y = 0; y <= 20; y += 10) {
                    const r = Math.floor(139 + 116 * Math.sin(x * 0.1 + time)); 
                    const g = Math.floor(0 + 20 * Math.cos(y * 0.1 + time)); 
                    const b = Math.floor(0 + 20 * Math.sin(time)); 
                    
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.beginPath();
                    const posX = (x / 20) * canvas.width;
                    const posY = (y / 20) * canvas.height;
                    
                    ctx.arc(posX, posY, canvas.width * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
