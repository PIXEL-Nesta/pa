<script>

const fireBtn = document.getElementById("fireBtn");
const btnValue = document.getElementById("btnValue");

function calculate() {

    let size = parseInt(fireBtn.value);
    let ram = parseInt(document.getElementById("ram").value);
    let age = parseInt(document.getElementById("age").value);
    let hz = parseInt(document.getElementById("hz").value);

    btnValue.innerText = size + "%";

    let gen = 95, red = 90;

    if (size > 70) { gen = 100; red = 95; }
    else if (size < 40) { gen = 90; red = 85; }

    if (ram <= 3) { gen += 5; red += 5; }
    if (ram >= 8) { gen -= 3; red -= 3; }

    if (hz == 60) gen += 3;
    if (hz == 120) gen -= 2;

    if (age >= 3) gen += 3;

    gen = Math.max(80, Math.min(100, gen));
    red = Math.max(75, Math.min(100, red));

    document.getElementById("gen").innerText = gen;
    document.getElementById("red").innerText = red;
    document.getElementById("sc2").innerText = red - 5;
    document.getElementById("sc4").innerText = Math.floor(gen * 0.75);
    document.getElementById("sniper").innerText = 50;
}

function copyData(){
    let text = `General: ${gen.innerText} | Red: ${red.innerText}`;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

fireBtn.addEventListener("input", calculate);
document.getElementById("ram").addEventListener("input", calculate);
document.getElementById("age").addEventListener("input", calculate);
document.getElementById("hz").addEventListener("change", calculate);

calculate();

</script>
